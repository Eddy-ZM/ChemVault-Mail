name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

[[d1_databases]]
binding = "db"			#d1数据库绑定名默认不可修改
database_name = "cloudmail"		#d1数据库名字
database_id = "79eabbfb-3a57-400f-aaf8-a2c3775f1110"		#d1数据库id

[[kv_namespaces]]
binding = "kv"			#kv绑定名默认不可修改
id = "67e88bbd2396401ab93e75f0e3b5da5d"					#kv数据库id

#[[r2_buckets]]
#binding = "r2"			#r2对象存储绑定名默认不可修改
#bucket_name = ""		#r2对象存储桶的名字

#[[send_email]]
#name = "email"			#CF发件, 配置后优先使用

[ai]
binding = "ai"

[assets]
binding = "assets"		#静态资源绑定名默认不可修改
directory = "./dist"	#前端vue项目打包的静态资源存放位置,默认dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["*/30 * * * *", "0 16 * * *"]	#每30分钟刷新分析缓存，每天晚上12点执行每日任务


[vars]
MAIL_DOMAIN = "chemvault.science"
IMAP_HOST = "imap.chemvault.science"
IMAP_PORT = 993
IMAP_SECURITY = "SSL/TLS"
SMTP_HOST = "smtp.chemvault.science"
SMTP_PORT = 587
SMTP_SECURITY = "STARTTLS"
#MAIL_CLIENT_AUTH_METHOD = "Normal password"
#ai_model = ""			#ai模型,不填默认使用@cf/meta/llama-3.1-8b-instruct
#analysis_cache = false			#是否开启分析数据缓存
#orm_log = false			#是否sql日志
#domain = []				#邮件域名可可配置多个 示例: ["example1.com","example2.com"]
#admin = ""				#管理员的邮箱	示例: admin@example.com
#jwt_secret = ""			#jwt令牌的密钥,随便填一串字符串
#mail_sso_secret = ""			#ChemVault User Center SSO签名密钥；必须和User Center的MAIL_SYSTEM_SSO_SECRET一致
#chemvault_user_origin = "https://user.chemvault.science"	#User Center SSO回调域名
#chemvault_user_sync_url = "https://user.chemvault.science/api/integrations/mail/users/sync"	#Mail新增用户后同步到User Center
#user_system_sync_secret = ""	#Secret; must match User Center MAIL_SYSTEM_SYNC_SECRET. Prefer wrangler secret put.
#cloudflare_access_team_domain = ""	#可选，Cloudflare Access Team domain 示例: your-team.cloudflareaccess.com
#cloudflare_access_aud = ""		#可选，Cloudflare Access 应用 AUD tag

[build]
command = "pnpm --dir ../mail-vue install --frozen-lockfile --prod=false && pnpm --dir ../mail-vue run build"
