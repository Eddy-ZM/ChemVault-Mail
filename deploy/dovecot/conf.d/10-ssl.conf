ssl = required
ssl_min_protocol = TLSv1.2

ssl_cert = </etc/letsencrypt/live/imap.chemvault.science/fullchain.pem
ssl_key = </etc/letsencrypt/live/imap.chemvault.science/privkey.pem

service imap-login {
  inet_listener imap {
    port = 0
  }

  inet_listener imaps {
    port = 993
    ssl = yes
  }
}
