name: CI
on:
  pull_request:
  push:
    branches: [main, test]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            mail-vue/pnpm-lock.yaml
            mail-worker/pnpm-lock.yaml
      - run: pnpm --dir mail-vue install --frozen-lockfile
      - run: pnpm --dir mail-worker install --frozen-lockfile
      - run: pnpm --dir mail-worker test -- --hookTimeout 30000
