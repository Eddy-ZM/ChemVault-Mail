name: Build ChemVault Mail for Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows installer
    runs-on: windows-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: mail-vue/pnpm-lock.yaml

      - name: Verify tag matches desktop version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $pkg = Get-Content -Raw mail-vue/package.json | ConvertFrom-Json
          $expected = "v$($pkg.version)"
          if ($env:GITHUB_REF_NAME -ne $expected) {
            Write-Error "Tag $env:GITHUB_REF_NAME does not match mail-vue package version $expected."
            exit 1
          }

      - name: Install frontend and desktop dependencies
        working-directory: mail-vue
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        working-directory: mail-vue
        run: pnpm run desktop:dist:win

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: chemvault-mail-windows
          path: |
            mail-vue/release/windows/v*/ChemVault-Mail-Setup-*.exe
            mail-vue/release/windows/v*/ChemVault-Mail-Setup-*.exe.blockmap
            mail-vue/release/windows/v*/latest.yml
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          make_latest: true
          body: |
            Unsigned Windows build.

            This installer is distributed outside Microsoft Store and is not Authenticode signed. Windows may show "Unknown publisher", SmartScreen may warn, and some enterprise security tools may block it.

            Desktop installer behavior:
            - Keeps ChemVault Mail.exe in the selected installation directory.
            - Lets the user choose Start Menu and Desktop shortcuts during installation.
            - Shows detailed install actions so copied files, shortcuts, and registry entries can be reviewed.
            - Adds a native startup animation before the Vue interface appears.
            - Archives release files under a versioned Windows folder.

            Do not disable SmartScreen or weaken system security settings to install it. Use only if you trust this GitHub Release source.
          files: |
            mail-vue/release/windows/v*/ChemVault-Mail-Setup-*.exe
            mail-vue/release/windows/v*/ChemVault-Mail-Setup-*.exe.blockmap
            mail-vue/release/windows/v*/latest.yml
