<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#F1F1F1" id="theme-color-meta">
  <meta name="description" content="ChemVault Mail provides custom-domain email for the ChemVault ecosystem on Cloudflare Workers and D1.">
  <title>ChemVault Mail</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/assets/favicon-192.png" type="image/png" sizes="192x192">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/chemvault-apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script>
    const uiStoreStr =  localStorage.getItem('ui')
    if (uiStoreStr) {
      const uiStore =  JSON.parse(uiStoreStr)
      const root = document.documentElement
      root.setAttribute('class', uiStore.dark ? 'dark' : '');
      const metaTag = document.getElementById('theme-color-meta');
      const isMobile =  !window.matchMedia("(pointer: fine) and (hover: hover)").matches;
      metaTag.setAttribute('content', uiStore.dark ? (isMobile ? '#141414' : '#000000') : (isMobile ? '#FFFFFF' : '#F1F1F1'));
    }
  </script>
<style>
  html {
    background: #FFFFFF;
  }
  .dark {
    background: #141414;
  }
  #loading-first {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    z-index: 500;
    background:
      radial-gradient(circle at 50% 38%, rgba(47, 111, 235, 0.16), transparent 34%),
      linear-gradient(145deg, #f8fbff 0%, #eef4fb 54%, #f7fafc 100%);
    color: #102033;
    transition: opacity 220ms ease, visibility 220ms ease;
  }

  .dark #loading-first {
    background:
      radial-gradient(circle at 50% 38%, rgba(63, 131, 248, 0.22), transparent 34%),
      linear-gradient(145deg, #05090e 0%, #0b111c 54%, #060a10 100%);
    color: #f7f9fc;
  }

  .loading-hide {
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
  }

  .loading-panel {
    display: grid;
    align-items: center;
    justify-items: center;
    gap: 16px;
    min-width: 260px;
    padding: 30px 34px 28px;
    border: 1px solid rgba(47, 111, 235, 0.12);
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.72);
    box-shadow:
      0 34px 90px rgba(15, 23, 42, 0.14),
      inset 0 1px 0 rgba(255, 255, 255, 0.86);
    backdrop-filter: blur(18px) saturate(1.08);
    -webkit-backdrop-filter: blur(18px) saturate(1.08);
  }

  .dark .loading-panel {
    border-color: rgba(255, 255, 255, 0.11);
    background: rgba(8, 14, 22, 0.68);
    box-shadow:
      0 34px 100px rgba(0, 0, 0, 0.44),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }

  .loading-eyebrow {
    color: rgba(16, 32, 51, 0.62);
    font: 600 12px/1 Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }

  .dark .loading-eyebrow {
    color: rgba(247, 249, 252, 0.76);
  }

  .loading-mark {
    position: relative;
    width: 86px;
    height: 86px;
    display: grid;
    place-items: center;
    border: 1px solid rgba(47, 111, 235, 0.14);
    border-radius: 28px;
    background:
      radial-gradient(circle at 50% 45%, rgba(47, 111, 235, 0.14), transparent 58%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.36));
  }

  .dark .loading-mark {
    border-color: rgba(120, 173, 255, 0.18);
    background:
      radial-gradient(circle at 50% 45%, rgba(63, 131, 248, 0.24), transparent 58%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
  }

  .loading-mark::before {
    content: "";
    position: absolute;
    width: 42px;
    height: 42px;
    border: 3px solid currentColor;
    border-right-color: transparent;
    border-radius: 13px;
    clip-path: polygon(12% 0, 100% 0, 100% 24%, 40% 24%, 40% 76%, 100% 76%, 100% 100%, 12% 100%, 0 88%, 0 12%);
    opacity: 0.9;
  }

  .loading-orbit {
    position: absolute;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #2f6feb;
    border-right-color: rgba(19, 168, 168, 0.7);
    animation: loading-orbit 1.1s linear infinite;
  }

  .loading-title {
    color: rgba(16, 32, 51, 0.82);
    font: 500 14px/1.2 Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.01em;
  }

  .dark .loading-title {
    color: rgba(247, 249, 252, 0.88);
  }

  .loading-progress {
    position: relative;
    width: 170px;
    height: 3px;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(47, 111, 235, 0.12);
  }

  .loading-progress::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #2f6feb, #13a8a8);
    transform: translateX(-110%);
    animation: loading-progress-flow 1.2s ease-in-out infinite;
  }

  @keyframes loading-orbit {
    to {
      transform: rotate(360deg);
    }
  }

  @keyframes loading-progress-flow {
    0% {
      transform: translateX(-110%);
    }
    100% {
      transform: translateX(235%);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .loading-orbit,
    .loading-progress::before {
      animation: none;
    }
  }
</style>
</head>
<body>
<div id="loading-first" role="status" aria-label="Loading ChemVault Mail">
  <div class="loading-panel">
    <div class="loading-eyebrow">ChemVault Mail</div>
    <div class="loading-mark" aria-hidden="true">
      <span class="loading-orbit"></span>
    </div>
    <div class="loading-title">Preparing mailbox</div>
    <div class="loading-progress" aria-hidden="true"></div>
  </div>
</div>
<div id="app"></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
