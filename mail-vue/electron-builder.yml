appId: science.chemvault.mail
productName: ChemVault Mail
copyright: Copyright (c) ChemVault
asar: true
npmRebuild: false

directories:
  buildResources: desktop
  output: release/windows

files:
  - dist/**/*
  - desktop/main.cjs
  - desktop/preload.cjs
  - desktop/splash.html
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: desktop/icon.ico
  verifyUpdateCodeSignature: false
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
    rfc3161TimeStampServer: http://timestamp.digicert.com
    timeStampServer: http://timestamp.digicert.com

nsis:
  include: installer.nsh
  artifactName: ChemVault-Mail-Setup-${version}.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  createStartMenuShortcut: false
  shortcutName: ChemVault Mail
  uninstallDisplayName: ChemVault Mail
  deleteAppDataOnUninstall: false

publish:
  provider: github
  owner: Chemaster-org
  repo: ChemVault-Mail
  releaseType: release
